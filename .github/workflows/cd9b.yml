# Ban sao 2/3 cua cd9.yml — GitHub hay bo qua cron */5, nen tach 3 workflow
# moi cai quet 15 phut lech nhau 5 phut de gop lai van phu moi 5 phut.
# Cung concurrency group voi cd9.yml nen khong bao gio chay de len nhau.
name: Chien dich 9b - quet lech 5 phut

on:
  schedule:
    - cron: "5,20,35,50 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: cd9-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Lay code
        uses: actions/checkout@v4

      - name: Cai Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Chien dich 9 - quet + vao lenh ao
        run: python paper_trade9.py

      - name: Luu du lieu vao repo
        run: |
          git config user.name "temp-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git pull --rebase || true
          git add data/trades9.csv data/cd9_price_hist.csv
          git diff --cached --quiet || git commit -m "CD9 quet $(date -u +%Y-%m-%dT%H:%M)"
          git push
