# Bot quét cơ hội Polymarket — chạy mỗi 4 giờ, chỉ quét và báo cáo.
name: Quet co hoi Polymarket

on:
  schedule:
    - cron: "25 * * * *"   # mỗi giờ, phút 25
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Lay code
        uses: actions/checkout@v4

      - name: Cai Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Quet co hoi
        run: python scan.py

      - name: Luu bao cao
        run: |
          git config user.name "temp-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          # Commit truoc khi pull (xem giai thich chi tiet trong daily.yml):
          # scan.py da ghi thang vao data/ nen dang co thay doi chua commit -
          # pull --rebase luc nay se bi loi "unstaged changes". Commit xong
          # roi moi pull thi an toan.
          git add data/
          git diff --cached --quiet || git commit -m "quet co hoi $(date -u +%Y-%m-%dT%H:%M)"
          # VPS tu day day len GitHub moi ~60s nen de bi dung do khi push -
          # thu lai toi 6 lan, moi lan pull --rebase (tu huy neu ket) roi
          # push lai.
          for i in 1 2 3 4 5 6; do
            if git push; then
              echo "Push thanh cong (lan $i)"
              break
            fi
            echo "Push that bai (lan $i) - co the dung do VPS - thu pull --rebase roi push lai"
            sleep $((RANDOM % 8 + 4))
            git pull --rebase || { git rebase --abort 2>/dev/null || true; }
          done
