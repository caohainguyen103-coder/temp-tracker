# Chạy tự động hàng ngày trên GitHub Actions — không cần máy tính bật.
# 12:10 UTC = 19:10 giờ Việt Nam. Với các thành phố châu Á (Seoul, HK,
# Trung Quốc), thời điểm này là buổi tối NGÀY HÔM TRƯỚC ngày mục tiêu xa nhất
# => snapshot có lead 1-2 ngày, đúng thứ cần cho phân tích.
# Chạy thêm lúc 00:10 UTC để verify sớm các ngày vừa kết thúc.
name: Thu thap du lieu nhiet do hang ngay

on:
  schedule:
    - cron: "10 12 * * *"
    - cron: "10 0 * * *"
  workflow_dispatch: {}   # cho phép bấm nút chạy tay để thử

permissions:
  contents: write

concurrency:
  group: daily-collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Lay code
        uses: actions/checkout@v4

      - name: Cai Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Không cần cài thư viện gì — script chỉ dùng thư viện chuẩn Python.

      - name: Thu thap snapshot thi truong + du bao
        run: python collect.py

      - name: Doi chieu ket qua ngay da qua
        run: python verify.py

      - name: Gia lap giao dich 200 do (tien ao)
        run: python paper_trade.py

      - name: Chien dich 4 - NO odds toi thieu 1.35 (1000 do ao)
        run: python paper_trade4.py

      - name: Chien dich 5 - NO theo GFS, loi >= 3 do (1000 do ao)
        run: python paper_trade5.py

      - name: Chien dich 6 - YES o dam dong 30-70c (1500 do ao)
        run: python paper_trade6.py

      - name: Chien dich 7 - NO o GFS 70-100c (1500 do ao)
        run: python paper_trade7.py

      - name: Chien dich 8 - The thao, canh Pinnacle >= 5% (500 do ao)
        run: python paper_trade8.py
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

      - name: Luu du lieu vao repo
        run: |
          git config user.name "temp-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git pull --rebase || true
          git add data/
          git diff --cached --quiet || git commit -m "du lieu $(date -u +%Y-%m-%dT%H:%M)"
          # VPS tu day day len GitHub moi ~60s nen de bi dung do khi push -
          # thu lai toi 6 lan, moi lan pull --rebase truoc khi push lai,
          # tranh mat trang toan bo ket qua da tinh (vd verify.py) chi vi
          # push 1 lan bi tu choi do khong phai fast-forward.
          for i in 1 2 3 4 5 6; do
            if git push; then
              echo "Push thanh cong (lan $i)"
              break
            fi
            echo "Push that bai (lan $i) - co the dung do VPS - thu pull --rebase roi push lai"
            sleep $((RANDOM % 8 + 4))
            git pull --rebase || true
          done
