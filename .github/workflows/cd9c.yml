# Ban sao 3/3 cua cd9.yml — xem ghi chu trong cd9b.yml.
name: Chien dich 9c - quet lech 10 phut

on:
  schedule:
    - cron: "10,25,40,55 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: cd9-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Lay code
        uses: actions/checkout@v4

      - name: Cai Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Chien dich 9 - quet + vao lenh ao
        run: python paper_trade9.py

      - name: Luu du lieu vao repo
        run: |
          git config user.name "temp-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git pull --rebase || true
          git add data/trades9.csv data/cd9_price_hist.csv
          git diff --cached --quiet || git commit -m "CD9 quet $(date -u +%Y-%m-%dT%H:%M)"
          git push
